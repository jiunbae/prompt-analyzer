version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: prompt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prompt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}  # Change in production
      POSTGRES_DB: prompts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompt -d prompts"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
