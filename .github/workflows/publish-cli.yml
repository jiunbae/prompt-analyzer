name: Publish CLI to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

          # Convert date-based tag (YYYY.M.D.N) to semver (YYYY.MDD.N)
          # e.g., 2026.2.9.1 → 2026.209.1
          NPM_VERSION=$(echo "$TAG_VERSION" | node -e "
            const parts = require('fs').readFileSync('/dev/stdin','utf8').trim().split('.');
            if (parts.length === 4) {
              const [y, m, d, n] = parts;
              console.log(y + '.' + m + d.padStart(2,'0') + '.' + n);
            } else {
              console.log(parts.join('.'));
            }
          ")
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG_VERSION → npm: $NPM_VERSION"

      - name: Update package.json version
        run: |
          cd packages/omp-cli
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.npm }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Set version to ' + pkg.version);
          "

      - name: Build CLI package
        run: |
          chmod +x scripts/build-cli.sh
          ./scripts/build-cli.sh

      - name: Verify build
        run: node packages/omp-cli/scripts/verify-build.js

      - name: Create tarball (dry run)
        run: |
          cd packages/omp-cli
          npm pack --dry-run

      - name: Publish to npm
        run: |
          cd packages/omp-cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## Installation
            ```bash
            npm install -g oh-my-prompt@${{ steps.version.outputs.npm }}
            ```

            npm version: `${{ steps.version.outputs.npm }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
