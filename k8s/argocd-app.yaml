apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oh-my-prompt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jiunbae/IaC.git
    targetRevision: main
    path: kubernetes/apps/oh-my-prompt
  destination:
    server: https://kubernetes.default.svc
    namespace: oh-my-prompt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
