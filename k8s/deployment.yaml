apiVersion: apps/v1
kind: Deployment
metadata:
  name: oh-my-prompt
  namespace: oh-my-prompt
  labels:
    app: oh-my-prompt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oh-my-prompt
  template:
    metadata:
      labels:
        app: oh-my-prompt
    spec:
      imagePullSecrets:
        - name: registry-creds
      containers:
        - name: oh-my-prompt
          image: registry.jiun.dev/oh-my-prompt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: oh-my-prompt-config
            - secretRef:
                name: oh-my-prompt-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
