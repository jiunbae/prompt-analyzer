apiVersion: batch/v1
kind: CronJob
metadata:
  name: oh-my-prompt-sync
  namespace: oh-my-prompt
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
          - name: sync
            image: curlimages/curl:latest
            env:
            - name: SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: oh-my-prompt-secrets
                  key: SYNC_TOKEN
            command:
            - /bin/sh
            - -c
            - |
              curl -X POST \
                "http://oh-my-prompt-service.oh-my-prompt.svc.cluster.local/api/sync" \
                -H "Content-Type: application/json" \
                -H "X-User-Token: ${SYNC_TOKEN}" \
                -d '{"type":"full","syncType":"cron"}' \
                --fail \
                --silent \
                --show-error
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
          restartPolicy: Never
